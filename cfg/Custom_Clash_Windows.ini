custom_proxy_group=🧱 手动选择`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]⬆️ 直连`.*
custom_proxy_group=🇯🇵 日本节点`url-test`!!PROVIDER=sub1`(日本)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`!!PROVIDER=sub1`(美国)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾节点`select`!!PROVIDER=sub1`(台湾)
custom_proxy_group=🔋 备用节点`select`!!PROVIDER=sub2`.*
custom_proxy_group=🌍 其他地区`select`(^(?!.*(港|HK|hk|Hong Kong|HongKong|hongkong|深港|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|UnitedStates|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan|🇯🇵|新加坡|坡|狮城|SG|Singapore|台|新北|彰化|TW|Taiwan)).*)
custom_proxy_group=⬆️ 直连`select`[]DIRECT
;设置分组标志位

;下方参数请勿修改
enable_rule_generator=true
overwrite_original_rules=true