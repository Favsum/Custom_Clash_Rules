custom_proxy_group=Ⓜ️ 微软服务`select`[]🇺🇸 美国节点`[]⬆️ 直连`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]🧱 手动选择
custom_proxy_group=🤖 AI服务`select`[]🇸🇬 新加坡节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]🧱 手动选择
custom_proxy_group=🖥️ GitHub`select`[]🇸🇬 新加坡节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]🧱 手动选择`[]⬆️ 直连
custom_proxy_group=📱 社交媒体`select`[]🇸🇬 新加坡节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]🧱 手动选择
custom_proxy_group=🎶 TikTok`select`[]🇸🇬 新加坡节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]🧱 手动选择
custom_proxy_group=🎮 游戏平台`select`[]⬆️ 直连`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]🧱 手动选择
custom_proxy_group=🎮 Steam`select`[]⬆️ 直连`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]🧱 手动选择
