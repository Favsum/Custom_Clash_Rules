
[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果

;谷歌在国内可用的域名强制直连
ruleset=⬆️ 直连,[]GEOSITE,google-cn
;常用国外服务
ruleset=✈️ Telegram,telegram
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🎶 TikTok,[]GEOSITE,tiktok
ruleset=📱 社交媒体,[]DOMAIN-SUFFIX,x.ai
ruleset=📱 社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🛜 测速工具,[]GEOSITE,category-speedtest
ruleset=🧱 手动选择,[]GEOSITE,github
ruleset=🇬 谷歌服务,[]GEOIP,google,no-resolve
ruleset=📱 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=✈️ Telegram,[]GEOIP,telegram,no-resolve
;国内地址和域名直连
ruleset=⬆️ 直连,[]GEOSITE,cn
ruleset=⬆️ 直连,[]GEOIP,cn,no-resolve
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位结束

;设置节点分组标志位
custom_proxy_group=🇭🇰 香港节点`url-test`!!PROVIDER=sub1`(香港)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`!!PROVIDER=sub1`(新加坡)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🐟 漏网之鱼`select`[]⬆️ 直连`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]🧱 手动选择
custom_proxy_group=✈️ Telegram`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]🧱 手动选择
custom_proxy_group=🎶 TikTok`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]🧱 手动选择
custom_proxy_group=📱 社交媒体`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]🧱 手动选择
custom_proxy_group=🤖 ChatGPT`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]🧱 手动选择
custom_proxy_group=🇬 谷歌服务`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]🧱 手动选择`[]⬆️ 直连
custom_proxy_group=🛜 测速工具`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]🧱 手动选择`[]⬆️ 直连
custom_proxy_group=🇯🇵 日本节点`url-test`!!PROVIDER=sub1`(日本)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🔋 备用节点`select`!!PROVIDER=sub2`(^(?!.*台湾直连)(?=.*(?:香港 0|新加坡 0|台湾 0|日本 0|美国 0|美国 Premium|直连|专)).*)
custom_proxy_group=🇺🇸 美国节点`url-test`!!PROVIDER=sub1`(美国)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾节点`select`!!PROVIDER=sub1`(台湾)
custom_proxy_group=🧱 手动选择`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇹🇼 台湾节点`[]🔋 备用节点`[]🌍 其他地区`[]⬆️ 直连`.*
custom_proxy_group=🌍 其他地区`select`(^(?!.*(港|HK|hk|Hong Kong|HongKong|hongkong|深港|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|UnitedStates|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan|🇯🇵|新加坡|坡|狮城|SG|Singapore|台|新北|彰化|TW|Taiwan)).*)
custom_proxy_group=⬆️ 直连`select`[]DIRECT
;设置分组标志位

;下方参数请勿修改
enable_rule_generator=true
overwrite_original_rules=true

